services:
  postgres:
    image: postgres:18-alpine
    container_name: carteirapro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carteirapro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ usa /var/lib/postgresql (não mais .../data)
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carteirapro"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: carteirapro-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=carteirapro;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      Brapi__Token: ${BRAPI_TOKEN:-}
      Database__AutoMigrate: "true"
      Swagger__Enabled: "true"
      Cors__Origins__0: http://localhost:5173
      Cors__Origins__1: http://127.0.0.1:5173
    ports:
      - "5122:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      target: development
    container_name: carteirapro-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://api:8080
    ports:
      - "5173:5173"
    volumes:
      - ./FrontEnd:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
